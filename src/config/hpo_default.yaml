defaults:
  - default
  - _self_

hpo:
  study_name: hpo_study
  direction: minimize
  n_trials: 50
  timeout: null
  show_progress_bar: true
  seed: 42
  storage: sqlite:///../data/hpo/${hpo.study_name}.db
  load_if_exists: true
  retrain_best: false

  sampler:
    name: TPESampler
    params:
      seed: ${hpo.seed}

  pruner:
    name: MedianPruner
    params:
      n_startup_trials: 5
      n_warmup_steps: 10

  validation:
    split_ratio: 0.2
    seed: ${hpo.seed}

  output_dir: ../data/hpo

  search_space: {}
