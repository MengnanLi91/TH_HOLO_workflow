defaults:
  - default
  - _self_  # Apply this file last so these values override default.yaml.

model:
  name: fno
  params:
    dimension: 2
    latent_channels: 32
    num_fno_layers: 4
    num_fno_modes: 12
    padding: 5
    decoder_layers: 1
    decoder_layer_size: 32

data:
  zarr_dir: ../data/processed/lid-driven
  input_fields: [pressure, vel_x, vel_y]
  output_fields: [pressure, vel_x, vel_y]
  input_time_idx: 0
  target_time_idx: -1
  split:
    strategy: sequential
    train_ratio: 0.8
    seed: 42

training:
  epochs: 20
  batch_size: 4
  num_workers: 0
  lr: 0.001
  seed: 42
  device: auto
  loss: mse

eval:
  checkpoint: ${output.checkpoint}
  run_meta: null
  batch_size: 4
  num_workers: 0
  device: auto
