defaults:
  - default
  - _self_  # Apply this file last so these values override default.yaml.

model:
  name: fno
  params:
    dimension: 2
    latent_channels: 32
    num_fno_layers: 4
    num_fno_modes: 12
    padding: 5
    decoder_layers: 1
    decoder_layer_size: 32

data:
  zarr_dir: ../data/processed/lid-driven
  input_fields: [pressure, vel_x, vel_y]
  output_fields: [pressure, vel_x, vel_y]
  input_time_idx: 0
  target_time_idx: -1
  split:
    strategy: sequential
    train_ratio: 0.8
    seed: 42

training:
  epochs: 20
  batch_size: 4
  num_workers: 0
  lr: 0.001
  seed: 42
  device: auto
  loss: mse

eval:
  checkpoint: ../data/models/lid_driven_fno.mdlus
  run_meta: null
  batch_size: 4
  num_workers: 0
  device: auto

output:
  checkpoint: ../data/models/lid_driven_fno.mdlus
  metrics_out: ../data/models/lid_driven_fno_metrics.json
  plot_dir: null
  plot_max_cases: 3
  plot_case_indices: null
  plot_velocity_x_field: vel_x
  plot_velocity_y_field: vel_y
  plot_quiver_step: 4
  plot_cmap: viridis
  plot_dpi: 150
