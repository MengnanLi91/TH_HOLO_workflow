defaults:
  - default
  - _self_

model:
  name: mlp
  params:
    layer_size: 128
    num_layers: 6
    activation_fn: silu
    skip_connections: true
    dropout: 0.0

data:
  zarr_dir: ../data/flow_contraction_expansion/parametric_study/processed
  input_columns: [log10_Re, Dr, Lr, z_hat, d_local_over_D, A_local_over_A, is_upstream, is_throat, is_downstream]
  output_columns: [log_alpha_D]
  normalize: true
  throat_weight: 5.0
  include_case_idx: true
  split:
    strategy: stratified
    train_ratio: 0.8
    seed: 42
    n_bins: 3

training:
  epochs: 1000
  batch_size: 2048
  num_workers: 4
  lr: 1.0e-4
  seed: 42
  device: auto
  loss: relative_l2
  weight_decay: 1.0e-5
  lr_scheduler: cosine
  experiment: training.experiments.alpha_d:AlphaDExperiment
  consistency_weight: 0.0
  early_stopping:
    patience: 30
    val_ratio: 0.15

output:
  checkpoint: ../data/models/alpha_d_mlp.mdlus
  metrics_out: ../data/models/alpha_d_mlp_metrics.json

# Hyperparameter optimization.  Set hpo=null on the CLI to skip HPO and
# train directly with the parameters above.
hpo:
  study_name: alpha_d_mlp_hpo_v5
  direction: minimize
  n_trials: 50
  seed: 42
  show_progress_bar: true
  storage: sqlite:///../data/hpo/${hpo.study_name}.db
  load_if_exists: true
  retrain_best: true
  output_dir: ../data/hpo

  sampler:
    name: TPESampler
    params:
      seed: ${hpo.seed}

  pruner:
    name: MedianPruner
    params:
      n_startup_trials: 5
      n_warmup_steps: 10

  validation:
    split_ratio: 0.2
    seed: ${hpo.seed}

  search_space:
    training.lr:
      type: float
      low: 1.0e-5
      high: 1.0e-3
      log: true

    training.batch_size:
      type: categorical
      choices: [512, 1024, 2048]

    training.weight_decay:
      type: float
      low: 1.0e-4
      high: 1.0e-2
      log: true

    model.params.layer_size:
      type: categorical
      choices: [128, 256]

    model.params.num_layers:
      type: int
      low: 5
      high: 8

    model.params.dropout:
      type: float
      low: 0.01
      high: 0.1

    data.throat_weight:
      type: categorical
      choices: [1.0, 3.0, 5.0, 10.0]
